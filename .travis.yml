dist: xenial
language: python
python:
  - "3.4"
  - "3.5"
  - "3.6"
  - "3.7"

install:
  - pip install -r requirements.txt


jobs:
  include:
    - stage: compile
      script: ./compile
    - stage: test
      script: ./unit_test
      script: ./scenario_test
    - stage: deploy
      script: ./deploy
      if: branch = master
