dist: xenial
language: python
python:
  - "3.5"
  - "3.6"
  - "3.7"
  - "3.8"

install:
  - pip install -r requirements.txt

script: ./unit_test

stages:
  - scenario_test
  - deploy

jobs:
  include:
    - stage: scenario_test
      script:
        - ./scenario_test
      python:
        - "3.7"
    - stage: deploy
      script: 
        - ./deploy
      python:
        - "3.7"
      if: branch = master
