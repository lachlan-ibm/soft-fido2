dist: xenial
language: python
python:
  - "3.4"
  - "3.5"
  - "3.6"
  - "3.7"

install:
  - pip install -r requirements.txt

stages:
  - compile
  - test
  - deploy

jobs:
  include:
    - stage: compile
      script: 
        - ./compile
    - stage: test
      script: 
        - ./unit_test
        - ./scenario_test
    - stage: deploy
      script: 
        - ./deploy
      if: branch = master
